model:
  model_id: step35
  model_name_or_path: /data/ci/models/step3.5/mg/step3.5-flash-layer4/
  trust_remote_code: True
  train_from_scratch: False
  tokenizer_name_or_path: /data/ci/models/step3.5/hf/step3.5-flash
  init_model_with_meta_device: True

data:
  dataset:
    file_name: /data/ci/datasets/origin/train-00000-of-00001-a09b74b3ef9c3b56.parquet
  template: gpt
  cutoff_len: 4096
  max_samples: 100000
  overwrite_cache: True
  preprocessing_num_workers: 1
  data_manager_type: mg

parallel:
  fsdp_size: 8
  fsdp_modules:
    - model.layers.{*}
    - model.embed_tokens
    - lm_head
  tp_size: 1
  ep_modules:
    - model.layers.{*}.mlp.experts
  ep_size: 4
  ep_fsdp_size: 2
  ep_fsdp_modules:
    - model.layers.{*}.mlp.experts
  ignored_modules:
    - model.layers.{*}.mlp.router
  ep_dispatcher: eager
  recompute: False
  recompute_modules:
    - model.layers.{*}
  cp_size: 1
  cp_type: ulysses

training:
  stage: pt
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  dataloader_num_workers : 1
  disable_shuffling: 1
  seed: 42
  max_steps: 15
  dataloader_drop_last: True
  output_dir: ./output
  optimizer: adamw
  lr: 1e-05
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
