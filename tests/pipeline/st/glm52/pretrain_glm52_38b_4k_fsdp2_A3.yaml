model:
  model_id: glm52
  trust_remote_code: False
  train_from_scratch: False
  init_model_with_meta_device: True
  tokenizer_name_or_path: None

data:
  dataset:
    file_name: "/data/ci/datasets/origin/train-00000-of-00001-a09b74b3ef9c3b56.parquet"
  template: gpt
  cutoff_len: 4096
  max_samples: 100000
  overwrite_cache: True
  preprocessing_num_workers: 1
  data_manager_type: mg

parallel:
  fsdp_modules:
    - model.layers.{*}
    - model.embed_tokens
    - lm_head
  ep_modules:
    - model.layers.{*}.mlp.experts
  ep_fsdp_modules:
    - model.layers.{*}.mlp.experts
  ep_dispatcher: eager
  recompute: True
  recompute_modules:
    - model.layers.{*}
  cp_size: 1
  cp_type: ulysses

training:
  stage: pt
  dataloader_num_workers : 1
  disable_shuffling: 1
  seed: 42
  dataloader_drop_last: True
  optimizer: adamw
  lr: 1.25e-06
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.99
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
  lr_scheduler_type: cosine
  warmup_ratio: 0.0
  min_lr: 1.25e-7
  max_steps: 15
  save_steps: 0
  save_epochs: 0
  logging_steps: 1
