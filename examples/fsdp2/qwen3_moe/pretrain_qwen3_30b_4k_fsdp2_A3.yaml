model:
  model_id: qwen3_moe
  trust_remote_code: True
  train_from_scratch: False
  tokenizer_name_or_path: ./model_weights/Qwen3-30B-A3B/
  init_model_with_meta_device: True

data:
  dataset:
    file_name: "./train-00000-of-00001-a09b74b3ef9c3b56.parquet"
  template: qwen3
  cutoff_len: 4096
  max_samples: 100000
  overwrite_cache: True
  preprocessing_num_workers: 1
  data_manager_type: mg

parallel:
  fsdp_modules:
    - model.layers.{*}
    - model.embed_tokens
    - lm_head
  ep_modules:
    - model.layers.{*}.mlp.experts
  ep_fsdp_modules:
    - model.layers.{*}.mlp.experts
  ep_dispatcher: eager
  recompute: True
  recompute_modules:
    - model.layers.{*}
  reduce_dtype: bf16
  cp_size: 1
  cp_type: ulysses

training:
  stage: pt
  dataloader_num_workers: 4
  disable_shuffling: True
  seed: 42
  dataloader_drop_last: True
  optimizer: adamw
  lr: 1e-05
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
  lr_scheduler_type: cosine
  warmup_ratio: 0.0
  min_lr: 1e-06
  num_train_epochs: 3.0
  max_steps: 2000
  save_steps: 500
  logging_steps: 1
